name = "insight-segment"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "none"
run_worker_first = true

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
invocation_logs = true

[env.dev]
name = "insight-segment-dev"
routes = [{ pattern = "insight-segment-dev.uni-scrm.com", custom_domain = true }]

[env.dev.vars]
WEB_URL = "https://web-dev.uni-scrm.com"

[[env.dev.d1_databases]]
binding = "WEB_DB"
database_name = "uniscrm-web-dev"
database_id = "899d288e-198c-49d9-824b-bd8d5c0a3cb8"
migrations_dir = "migrations"

[env.dev.ai]
binding = "AI"

[env.production]
name = "insight-segment"
routes = [{ pattern = "insight-segment.uni-scrm.com", custom_domain = true }]

[env.production.vars]
WEB_URL = "https://web.uni-scrm.com"

[[env.production.d1_databases]]
binding = "WEB_DB"
database_name = "uniscrm-web"
database_id = "98ea05ba-91de-423d-9126-aa3cd9b42382"
migrations_dir = "migrations"

[env.production.ai]
binding = "AI"
