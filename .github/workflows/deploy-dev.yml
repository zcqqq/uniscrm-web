name: Deploy Dev

on:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      analytics: ${{ steps.filter.outputs.analytics }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        name: Detect analytics-relevant changes
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "analytics=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "$BEFORE" "${{ github.sha }}" | grep -qE '^(analytics|shared|metadata)/'; then
            echo "analytics=true" >> "$GITHUB_OUTPUT"
          else
            echo "analytics=false" >> "$GITHUB_OUTPUT"
          fi

  tenant-scope-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Tenant-scope audit
        run: node scripts/tenant-scope-audit.mjs --check

  sync-secrets:
    runs-on: ubuntu-latest
    environment: dev
    strategy:
      fail-fast: false
      # Throttle the parallel `wrangler secret bulk` calls: firing all modules at
      # once trips the Cloudflare API rate limit (error 10429) on secrets-bulk.
      max-parallel: 2
      matrix:
        include:
          - module: web
            config: web/wrangler.toml
          - module: link
            config: link/wrangler.toml
          - module: flow
            config: flow/wrangler.toml
          - module: admin
            config: admin/wrangler.toml
          - module: profile
            config: profile/wrangler.toml
          - module: insight-segment
            config: insight-segment/wrangler.toml
          - module: trend-skill
            config: trend-skill/wrangler.toml
          - module: content
            config: content/wrangler.toml
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm ci

      - name: Sync secrets
        run: ./scripts/sync-secrets.sh dev ${{ matrix.module }} ${{ matrix.config }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          X_CLIENT_SECRET: ${{ secrets.X_CLIENT_SECRET }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          CF_D1_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}

  migrate:
    needs: [sync-secrets]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - db: uniscrm-web-dev
            config: web/wrangler.toml
          - db: uniscrm-link-dev
            config: link/wrangler.toml
          - db: uniscrm-flow-dev
            config: flow/wrangler.toml
          - db: uniscrm-admin-dev
            config: admin/wrangler.toml
          - db: uniscrm-analytics-dev
            config: analytics/wrangler.toml
          - db: uniscrm-web-dev
            config: insight-segment/wrangler.toml
          - db: uniscrm-web-dev
            config: profile/wrangler.toml
          - db: uniscrm-web-dev
            config: trend-skill/wrangler.toml
          - db: uniscrm-content-dev
            config: content/wrangler.toml
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm ci

      - name: Run migrations
        run: npx wrangler d1 migrations apply ${{ matrix.db }} --env dev --config ${{ matrix.config }} --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  migrate-tenant-dbs:
    needs: [sync-secrets]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm ci

      - name: Install operation dependencies
        run: cd operation && npm ci

      - name: Migrate tenant DBs
        run: node --experimental-strip-types operation/migrate-tenant-dbs.ts dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy:
    needs: [migrate, migrate-tenant-dbs, changes, tenant-scope-audit]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [web, link, flow, admin, analytics, insight-segment, profile, trend-skill, content]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install shared dependencies
        if: matrix.module != 'analytics' || needs.changes.outputs.analytics == 'true'
        run: npm ci

      - name: Install module dependencies
        if: matrix.module != 'analytics' || needs.changes.outputs.analytics == 'true'
        run: |
          if [ -f "${{ matrix.module }}/package-lock.json" ]; then
            cd ${{ matrix.module }} && npm ci
          fi

      - name: Build frontend
        if: matrix.module != 'analytics' || needs.changes.outputs.analytics == 'true'
        run: |
          if [ -f "${{ matrix.module }}/vite.config.ts" ]; then
            cd ${{ matrix.module }} && npx vite build
          fi

      - name: Cache pyarrow wheel (analytics compactor)
        if: matrix.module == 'analytics' && needs.changes.outputs.analytics == 'true'
        uses: actions/cache@v4
        with:
          path: analytics/compactor/vendor/pyarrow-25.0.0-cp312-cp312-manylinux_2_28_x86_64.whl
          key: pyarrow-wheel-25.0.0-cp312-cp312-manylinux_2_28_x86_64

      - name: Download vendored pyarrow wheel (analytics compactor)
        if: matrix.module == 'analytics' && needs.changes.outputs.analytics == 'true'
        run: |
          mkdir -p analytics/compactor/vendor
          if [ ! -f analytics/compactor/vendor/pyarrow-25.0.0-cp312-cp312-manylinux_2_28_x86_64.whl ]; then
            curl -L --fail -o analytics/compactor/vendor/pyarrow-25.0.0-cp312-cp312-manylinux_2_28_x86_64.whl \
              https://files.pythonhosted.org/packages/55/0e/cd705c042bc4fe7022478db577fcab4abdcfabb9bc37ab7a75556b3fcb2b/pyarrow-25.0.0-cp312-cp312-manylinux_2_28_x86_64.whl
          fi

      - name: Deploy
        if: matrix.module != 'analytics' || needs.changes.outputs.analytics == 'true'
        run: npx wrangler deploy --env dev --config ${{ matrix.module }}/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  setup-stripe:
    needs: [deploy]
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm ci

      - name: Setup Stripe
        run: ./scripts/setup-stripe.sh dev
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  e2e:
    needs: [deploy, setup-stripe]
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm ci

      - name: Seed test data
        run: ./scripts/seed-e2e.sh dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run E2E tests
        run: npx playwright test --config e2e/playwright.config.ts
        env:
          E2E_ENV: dev

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/

      - name: Print external config on failure
        if: failure()
        run: |
          echo "📋 Check external platform configuration:"
          cat EXTERNAL_CONFIG.md
