name = "trend-skill"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
TREND_RETENTION_DAYS = "30"

[env.dev]
name = "trend-skill-dev"

[env.dev.vars]
TREND_RETENTION_DAYS = "30"

[[env.dev.kv_namespaces]]
binding = "TREND_KV"
id = "ac8b64b59ac540e0ab482f25bb78d41e"

[[env.dev.d1_databases]]
binding = "TREND_DB"
database_name = "trend-skill-db-dev"
database_id = "b322777d-6617-4dbf-a4d2-f734166b7737"

[[env.dev.vectorize]]
binding = "TREND_VECTORIZE"
index_name = "trend-embeddings-dev"

[env.dev.ai]
binding = "AI"

[env.dev.triggers]
crons = ["0 0 * * *"]

[env.production]
name = "trend-skill"

[[env.production.kv_namespaces]]
binding = "TREND_KV"
id = "<prod-kv-id>"

[[env.production.d1_databases]]
binding = "TREND_DB"
database_name = "trend-skill-db"
database_id = "<prod-d1-id>"

[[env.production.vectorize]]
binding = "TREND_VECTORIZE"
index_name = "trend-embeddings"

[env.production.ai]
binding = "AI"

[env.production.triggers]
crons = ["0 0 * * *"]
