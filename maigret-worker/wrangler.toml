name = "maigret-worker"
main = "src/index.ts"
compatibility_date = "2026-01-10"

[env.dev]
name = "maigret-worker-dev"

[env.dev.vars]
LINK_SOCIAL_URL = "https://link-social-dev.uni-scrm.com"
INTERNAL_SECRET = "dev-internal-secret"

[[env.dev.containers]]
class_name = "MaigretContainer"
image = "./Dockerfile"
instance_type = "basic"
max_instances = 1

[[env.dev.durable_objects.bindings]]
name = "MAIGRET_CONTAINER"
class_name = "MaigretContainer"

[[env.dev.migrations]]
tag = "v1"
new_sqlite_classes = ["MaigretContainer"]

[[env.dev.queues.consumers]]
queue = "maigret-jobs-dev"
max_batch_size = 1
max_batch_timeout = 30

[env.production]
name = "maigret-worker"

[env.production.vars]
LINK_SOCIAL_URL = "https://link-social.uni-scrm.com"

[[env.production.containers]]
class_name = "MaigretContainer"
image = "./Dockerfile"
instance_type = "basic"
max_instances = 3

[[env.production.durable_objects.bindings]]
name = "MAIGRET_CONTAINER"
class_name = "MaigretContainer"

[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["MaigretContainer"]

[[env.production.queues.consumers]]
queue = "maigret-jobs"
max_batch_size = 1
max_batch_timeout = 30
