name: Deploy Production

on:
  workflow_dispatch:

jobs:
  sync-secrets:
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: web
            config: web/wrangler.toml
          - module: link
            config: link/wrangler.toml
          - module: flow
            config: flow/wrangler.toml
          - module: admin
            config: admin/wrangler.toml
          - module: profile
            config: profile/wrangler.toml
          - module: insight-segment
            config: insight-segment/wrangler.toml
          - module: trend-skill
            config: trend-skill/wrangler.toml
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm ci

      - name: Sync secrets
        run: ./scripts/sync-secrets.sh production ${{ matrix.module }} ${{ matrix.config }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          X_CLIENT_SECRET: ${{ secrets.X_CLIENT_SECRET }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          INTERNAL_SECRET: ${{ secrets.INTERNAL_SECRET }}
          CF_D1_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}

  migrate:
    needs: [sync-secrets]
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - db: uniscrm-web
            config: web/wrangler.toml
          - db: uniscrm-link
            config: link/wrangler.toml
          - db: uniscrm-flow
            config: flow/wrangler.toml
          - db: uniscrm-admin
            config: admin/wrangler.toml
          - db: uniscrm-analytics
            config: analytics/wrangler.toml
          - db: uniscrm-web
            config: insight-segment/wrangler.toml
          - db: uniscrm-web
            config: profile/wrangler.toml
          - db: uniscrm-web
            config: trend-skill/wrangler.toml
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm ci

      - name: Run migrations
        run: npx wrangler d1 migrations apply ${{ matrix.db }} --env production --config ${{ matrix.config }} --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy:
    needs: [migrate]
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        module: [web, link, flow, admin, analytics, insight-segment, profile, trend-skill]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install shared dependencies
        run: npm ci

      - name: Install module dependencies
        run: |
          if [ -f "${{ matrix.module }}/package-lock.json" ]; then
            cd ${{ matrix.module }} && npm ci
          fi

      - name: Build frontend
        run: |
          if [ -f "${{ matrix.module }}/vite.config.ts" ]; then
            cd ${{ matrix.module }} && npx vite build
          fi

      - name: Deploy
        run: npx wrangler deploy --env production --config ${{ matrix.module }}/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  setup-stripe-webhook:
    needs: [deploy]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm ci

      - name: Setup Stripe webhook
        run: ./scripts/setup-stripe-webhook.sh production
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  smoke-test:
    needs: [deploy, setup-stripe-webhook]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: web
            url: https://web.uni-scrm.com/api/health
          - module: link
            url: https://link.uni-scrm.com/api/health
          - module: flow
            url: https://flow.uni-scrm.com/api/health
          - module: admin
            url: https://admin.uni-scrm.com/api/health
          - module: analytics
            url: https://analytics.uni-scrm.com/api/health
          - module: insight-segment
            url: https://insight-segment.uni-scrm.com/api/health
          - module: profile
            url: https://profile.uni-scrm.com/api/health
          - module: trend-skill
            url: https://trend-skill.uni-scrm.com/api/health
    steps:
      - uses: actions/checkout@v4

      - name: Health check ${{ matrix.module }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ matrix.url }}" || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ ${{ matrix.module }}: OK"
          else
            echo "❌ ${{ matrix.module }}: HTTP $STATUS"
            echo ""
            echo "📋 Check external platform configuration:"
            cat EXTERNAL_CONFIG.md
            exit 1
          fi
