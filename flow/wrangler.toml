name = "flow"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "none"
run_worker_first = true

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
invocation_logs = true

[env.dev]
name = "flow-dev"
routes = [{ pattern = "flow-dev.uni-scrm.com", custom_domain = true }]

[env.dev.vars]
WEB_URL = "https://web-dev.uni-scrm.com"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "trend-skill-db-dev"
database_id = "b322777d-6617-4dbf-a4d2-f734166b7737"
migrations_dir = "migrations"

[env.production]
name = "flow"
routes = [{ pattern = "flow.uni-scrm.com", custom_domain = true }]

[env.production.vars]
WEB_URL = "https://web.uni-scrm.com"

[[env.production.d1_databases]]
binding = "DB"
database_name = "trend-skill-db"
database_id = "ccd56e94-b85c-4144-ac18-a6946897a5b3"
migrations_dir = "migrations"
