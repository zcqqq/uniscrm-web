name: Deploy Dev

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [web, link, flow, admin, analytics, insight-segment, profile, trend-skill]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install shared dependencies
        run: npm ci

      - name: Install module dependencies
        run: |
          if [ -f "${{ matrix.module }}/package-lock.json" ]; then
            cd ${{ matrix.module }} && npm ci
          fi

      - name: Build frontend
        run: |
          if [ -f "${{ matrix.module }}/vite.config.ts" ]; then
            cd ${{ matrix.module }} && npx vite build
          fi

      - name: Deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --env dev --config ${{ matrix.module }}/wrangler.toml
