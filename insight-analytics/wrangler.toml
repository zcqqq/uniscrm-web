name = "insight-analytics"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "none"
run_worker_first = true

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
invocation_logs = true

[env.dev]
name = "insight-analytics-dev"
routes = [{ pattern = "insight-analytics-dev.uni-scrm.com", custom_domain = true }]

[env.dev.vars]
WEB_URL = "https://web-dev.uni-scrm.com"
CF_ACCOUNT_ID = "b34f3ff4aec4c36584672d5bf1320757"
R2_WAREHOUSE = "b34f3ff4aec4c36584672d5bf1320757_uniscrm-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "uniscrm-db-dev"
database_id = "95ad8842-5b0d-4ff4-854d-9c42f4b0685f"
migrations_dir = "migrations"

[[env.dev.queues.producers]]
binding = "ANALYTICS_QUEUE"
queue = "analytics-jobs-dev"

[[env.dev.queues.consumers]]
queue = "analytics-jobs-dev"
max_batch_size = 1
max_batch_timeout = 60

[[env.dev.containers]]
class_name = "AnalyticsContainer"
image = "./Dockerfile"
instance_type = "basic"
max_instances = 1

[[env.dev.durable_objects.bindings]]
name = "ANALYTICS_CONTAINER"
class_name = "AnalyticsContainer"

[[env.dev.migrations]]
tag = "v1"
new_sqlite_classes = ["AnalyticsContainer"]

[env.production]
name = "insight-analytics"
routes = [{ pattern = "insight-analytics.uni-scrm.com", custom_domain = true }]

[env.production.vars]
WEB_URL = "https://web.uni-scrm.com"
CF_ACCOUNT_ID = "b34f3ff4aec4c36584672d5bf1320757"
R2_WAREHOUSE = "b34f3ff4aec4c36584672d5bf1320757_uniscrm"

[[env.production.d1_databases]]
binding = "DB"
database_name = "uniscrm-db"
database_id = "ccd56e94-b85c-4144-ac18-a6946897a5b3"
migrations_dir = "migrations"

[[env.production.queues.producers]]
binding = "ANALYTICS_QUEUE"
queue = "analytics-jobs"

[[env.production.queues.consumers]]
queue = "analytics-jobs"
max_batch_size = 1
max_batch_timeout = 60

[[env.production.containers]]
class_name = "AnalyticsContainer"
image = "./Dockerfile"
instance_type = "basic"
max_instances = 3

[[env.production.durable_objects.bindings]]
name = "ANALYTICS_CONTAINER"
class_name = "AnalyticsContainer"

[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["AnalyticsContainer"]
