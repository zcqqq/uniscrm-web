name: Deploy Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        module: [web, link, flow, admin, insight-segment, trend-skill]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          if [ -f "${{ matrix.module }}/package-lock.json" ]; then
            cd ${{ matrix.module }} && npm ci
          fi

      - name: Build frontend
        run: |
          if [ -f "${{ matrix.module }}/vite.config.ts" ]; then
            cd ${{ matrix.module }} && npx vite build
          fi

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --env production --config ${{ matrix.module }}/wrangler.toml
