name = "trend-skill"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

[vars]
TREND_RETENTION_DAYS = "30"

[env.dev]
name = "trend-skill-dev"

[env.dev.vars]
TREND_RETENTION_DAYS = "30"

[[env.dev.kv_namespaces]]
binding = "TREND_KV"
id = "58fa452dbfa94c308d8aaa21fb6c8e0a"

[[env.dev.d1_databases]]
binding = "TREND_DB"
database_name = "uniscrm-web-dev"
database_id = "899d288e-198c-49d9-824b-bd8d5c0a3cb8"
migrations_dir = "migrations"

[[env.dev.vectorize]]
binding = "TREND_VECTORIZE"
index_name = "uniscrm-embeddings-dev"

[env.dev.ai]
binding = "AI"

[env.production]
name = "trend-skill"

[env.production.vars]
TREND_RETENTION_DAYS = "30"

[[env.production.kv_namespaces]]
binding = "TREND_KV"
id = "58fa452dbfa94c308d8aaa21fb6c8e0a"

[[env.production.d1_databases]]
binding = "TREND_DB"
database_name = "uniscrm-web"
database_id = "ccd56e94-b85c-4144-ac18-a6946897a5b3"
migrations_dir = "migrations"

[[env.production.vectorize]]
binding = "TREND_VECTORIZE"
index_name = "uniscrm-embeddings"

[env.production.ai]
binding = "AI"

