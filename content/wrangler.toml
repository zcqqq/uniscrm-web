name = "content"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "none"
run_worker_first = true

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
invocation_logs = true

[env.dev]
name = "content-dev"
routes = [{ pattern = "content-dev.uni-scrm.com", custom_domain = true }]

[env.dev.vars]
WEB_URL = "https://web-dev.uni-scrm.com"
CONTENT_URL = "https://content-dev.uni-scrm.com"
FLOW_URL = "https://flow-dev.uni-scrm.com"
INTERNAL_SECRET = "dev-internal-secret"
CF_ACCOUNT_ID = "b34f3ff4aec4c36584672d5bf1320757"
R2_ACCOUNT_ID = "b34f3ff4aec4c36584672d5bf1320757"
R2_BUCKET_NAME = "uniscrm-content-media-dev"

[[env.dev.d1_databases]]
binding = "CONTENT_DB"
database_name = "uniscrm-content-dev"
database_id = "e359f919-c260-43ce-98a8-7db1e3845c7d"
migrations_dir = "migrations"

[env.dev.ai]
binding = "AI"

[[env.dev.containers]]
class_name = "SubtitleContainer"
image = "./Dockerfile"
instance_type = "standard-1"
max_instances = 1

[[env.dev.durable_objects.bindings]]
name = "SUBTITLE_CONTAINER"
class_name = "SubtitleContainer"

[[env.dev.migrations]]
tag = "v1"
new_sqlite_classes = ["SubtitleContainer"]

[[env.dev.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "uniscrm-content-media-dev"

[[env.dev.secrets_store_secrets]]
binding = "ENCRYPTION_KEY"
store_id = "358a0014b2254c2eafb877e4182fd977"
secret_name = "uniscrm-content-encryption-key-dev"

[[env.dev.secrets_store_secrets]]
binding = "R2_ACCESS_KEY_ID"
store_id = "358a0014b2254c2eafb877e4182fd977"
secret_name = "uniscrm-content-r2-access-key-id-dev"

[[env.dev.secrets_store_secrets]]
binding = "R2_SECRET_ACCESS_KEY"
store_id = "358a0014b2254c2eafb877e4182fd977"
secret_name = "uniscrm-content-r2-secret-access-key-dev"

[[env.dev.queues.consumers]]
queue = "uniscrm-video-action-dev"
max_batch_size = 1
max_batch_timeout = 5

[env.production]
name = "content"
routes = [{ pattern = "content.uni-scrm.com", custom_domain = true }]

[env.production.vars]
WEB_URL = "https://web.uni-scrm.com"
CONTENT_URL = "https://content.uni-scrm.com"
FLOW_URL = "https://flow.uni-scrm.com"
INTERNAL_SECRET = "prod-internal-secret-change-me"
CF_ACCOUNT_ID = "b34f3ff4aec4c36584672d5bf1320757"
R2_ACCOUNT_ID = "b34f3ff4aec4c36584672d5bf1320757"
R2_BUCKET_NAME = "uniscrm-content-media"

[[env.production.d1_databases]]
binding = "CONTENT_DB"
database_name = "uniscrm-content"
database_id = "4816dc5e-1e6e-40b3-b24e-16469f1d7542"
migrations_dir = "migrations"

[env.production.ai]
binding = "AI"

[[env.production.containers]]
class_name = "SubtitleContainer"
image = "./Dockerfile"
instance_type = "standard-1"
max_instances = 3

[[env.production.durable_objects.bindings]]
name = "SUBTITLE_CONTAINER"
class_name = "SubtitleContainer"

[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["SubtitleContainer"]

[[env.production.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "uniscrm-content-media"

[[env.production.secrets_store_secrets]]
binding = "ENCRYPTION_KEY"
store_id = "358a0014b2254c2eafb877e4182fd977"
secret_name = "uniscrm-content-encryption-key"

[[env.production.secrets_store_secrets]]
binding = "R2_ACCESS_KEY_ID"
store_id = "358a0014b2254c2eafb877e4182fd977"
secret_name = "uniscrm-content-r2-access-key-id"

[[env.production.secrets_store_secrets]]
binding = "R2_SECRET_ACCESS_KEY"
store_id = "358a0014b2254c2eafb877e4182fd977"
secret_name = "uniscrm-content-r2-secret-access-key"

[[env.production.queues.consumers]]
queue = "uniscrm-video-action"
max_batch_size = 1
max_batch_timeout = 5
