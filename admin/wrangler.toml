name = "admin"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

[env.dev]
name = "admin-dev"
routes = [{ pattern = "admin-dev.uni-scrm.com", custom_domain = true }]

[env.dev.triggers]
crons = ["0 */6 * * *"]

[env.dev.vars]
INTERNAL_SECRET = "dev-internal-secret"
CF_ACCOUNT_ID = "b34f3ff4aec4c36584672d5bf1320757"
ENVIRONMENT = "dev"
STRIPE_PRICE_BASIC = "price_1TiW9PLhYonpsSAWQbGlYm9D"
STRIPE_PRICE_PRO = "price_1TiW9sLhYonpsSAWeyyfaQUU"

[[env.dev.d1_databases]]
binding = "ADMIN_DB"
database_name = "uniscrm-admin-dev"
database_id = "e82f67f3-3571-473f-abf4-fa0ad5a309a2"

[[env.dev.d1_databases]]
binding = "WEB_DB"
database_name = "uniscrm-web-dev"
database_id = "899d288e-198c-49d9-824b-bd8d5c0a3cb8"

[env.production]
name = "admin"
routes = [{ pattern = "admin.uni-scrm.com", custom_domain = true }]

[[env.production.d1_databases]]
binding = "DB"
database_name = "uniscrm-web"
database_id = "ccd56e94-b85c-4144-ac18-a6946897a5b3"
