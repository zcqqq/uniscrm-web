name = "trend-skill"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["*/10 * * * *"]

[[kv_namespaces]]
binding = "TREND_KV"
id = "817a8d2901ef41c19d2021415241e915"

[[d1_databases]]
binding = "TREND_DB"
database_name = "trend-skill-db"
database_id = "d8c26e02-42e7-4478-8127-9b1559da6bf9"
migrations_dir = "migrations"

[[vectorize]]
binding = "TREND_VECTORIZE"
index_name = "trend-embeddings"

[ai]
binding = "AI"

# TWITTER_BEARER_TOKEN and ADMIN_SECRET are set via `wrangler secret put`
