name: Deploy Production

on:
  workflow_dispatch:

jobs:
  sync-secrets:
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: web
            config: web/wrangler.toml
          - module: link
            config: link/wrangler.toml
          - module: flow
            config: flow/wrangler.toml
          - module: admin
            config: admin/wrangler.toml
          - module: profile
            config: profile/wrangler.toml
          - module: insight-segment
            config: insight-segment/wrangler.toml
          - module: trend-skill
            config: trend-skill/wrangler.toml
          - module: content
            config: content/wrangler.toml
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm ci

      - name: Sync secrets
        run: ./scripts/sync-secrets.sh production ${{ matrix.module }} ${{ matrix.config }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          X_CLIENT_SECRET: ${{ secrets.X_CLIENT_SECRET }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          CF_D1_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}

  migrate:
    needs: [sync-secrets]
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - db: uniscrm-web
            config: web/wrangler.toml
          - db: uniscrm-link
            config: link/wrangler.toml
          - db: uniscrm-flow
            config: flow/wrangler.toml
          - db: uniscrm-admin
            config: admin/wrangler.toml
          - db: uniscrm-analytics
            config: analytics/wrangler.toml
          - db: uniscrm-web
            config: insight-segment/wrangler.toml
          - db: uniscrm-web
            config: profile/wrangler.toml
          - db: uniscrm-web
            config: trend-skill/wrangler.toml
          - db: uniscrm-content
            config: content/wrangler.toml
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm ci

      - name: Run migrations
        run: npx wrangler d1 migrations apply ${{ matrix.db }} --env production --config ${{ matrix.config }} --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  migrate-tenant-dbs:
    needs: [sync-secrets]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm ci

      - name: Install operation dependencies
        run: cd operation && npm ci

      - name: Migrate tenant DBs
        run: node --experimental-strip-types operation/migrate-tenant-dbs.ts production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy:
    needs: [migrate, migrate-tenant-dbs]
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        module: [web, link, flow, admin, analytics, insight-segment, profile, trend-skill, content]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install shared dependencies
        run: npm ci

      - name: Install module dependencies
        run: |
          if [ -f "${{ matrix.module }}/package-lock.json" ]; then
            cd ${{ matrix.module }} && npm ci
          fi

      - name: Build frontend
        run: |
          if [ -f "${{ matrix.module }}/vite.config.ts" ]; then
            cd ${{ matrix.module }} && npx vite build
          fi

      - name: Download vendored pyarrow wheel (analytics compactor)
        if: matrix.module == 'analytics'
        run: |
          mkdir -p analytics/compactor/vendor
          curl -L --fail -o analytics/compactor/vendor/pyarrow-25.0.0-cp312-cp312-manylinux_2_28_x86_64.whl \
            https://files.pythonhosted.org/packages/55/0e/cd705c042bc4fe7022478db577fcab4abdcfabb9bc37ab7a75556b3fcb2b/pyarrow-25.0.0-cp312-cp312-manylinux_2_28_x86_64.whl

      - name: Deploy
        run: npx wrangler deploy --env production --config ${{ matrix.module }}/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  setup-stripe:
    needs: [deploy]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm ci

      - name: Setup Stripe webhook
        run: ./scripts/setup-stripe.sh production
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

