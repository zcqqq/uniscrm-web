name = "link"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "none"
run_worker_first = true

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
invocation_logs = true

[env.dev]
name = "link-dev"
routes = [{ pattern = "link-dev.uni-scrm.com", custom_domain = true }]

[env.dev.vars]
LINK_URL = "https://link-dev.uni-scrm.com"
CONTENT_URL = "https://content-dev.uni-scrm.com"
TREND_RETENTION_DAYS = "30"
WEB_URL = "https://web-dev.uni-scrm.com"
FLOW_URL = "https://flow-dev.uni-scrm.com"
CF_ACCOUNT_ID = "b34f3ff4aec4c36584672d5bf1320757"
R2_BUCKET = "uniscrm-dev"
R2_WAREHOUSE = "b34f3ff4aec4c36584672d5bf1320757_uniscrm-dev"
X_CLIENT_ID = "cS1kY2RlNnc1VldHSWw0LVJQSFM6MTpjaQ"
GOOGLE_CLIENT_ID = "1038882920781-unbsoa2prpnvqufeicaqqe1mlgso5ac9.apps.googleusercontent.com"
TIKTOK_CLIENT_KEY = "sbaw7873x5p4wuwsiw"
INTERNAL_SECRET = "dev-internal-secret"

[[env.dev.d1_databases]]
binding = "LINK_DB"
database_name = "uniscrm-link-dev"
database_id = "464f02da-5a53-438d-8f7b-f92519cf8bd9"
migrations_dir = "migrations"

[[env.dev.d1_databases]]
binding = "WEB_DB"
database_name = "uniscrm-web-dev"
database_id = "899d288e-198c-49d9-824b-bd8d5c0a3cb8"

[[env.dev.d1_databases]]
binding = "ADMIN_DB"
database_name = "uniscrm-admin-dev"
database_id = "e82f67f3-3571-473f-abf4-fa0ad5a309a2"

[[env.dev.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "uniscrm-link-media-dev"

[[env.dev.kv_namespaces]]
binding = "KV"
id = "9f65b37e6ac94f81948a0018f816f89f"

[[env.dev.vectorize]]
binding = "VECTORIZE"
index_name = "uniscrm-embeddings-dev"

[env.dev.ai]
binding = "AI"

[[env.dev.queues.producers]]
binding = "MAIGRET_QUEUE"
queue = "uniscrm-maigret-dev"

[[env.dev.queues.producers]]
binding = "FLOW_QUEUE"
queue = "uniscrm-event-dev"

# [[env.dev.pipelines]]
# binding = "PIPELINE_EVENT"
# pipeline = "TODO_REBUILD_EVENT_STREAM"

[[env.dev.pipelines]]
binding = "PIPELINE_USER"
stream = "8e45214807d640e9bdfea318fd1fb8d2"

[[env.dev.pipelines]]
binding = "PIPELINE_CONTENT"
stream = "2ed6fd2b333d42638580689910ed2661"

[[env.dev.secrets_store_secrets]]
binding = "ENCRYPTION_KEY"
store_id = "358a0014b2254c2eafb877e4182fd977"
secret_name = "uniscrm-encryption-key-dev"

[env.dev.triggers]
crons = ["0 * * * *"]

